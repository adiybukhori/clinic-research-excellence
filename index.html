<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Research Excellence 2026</title>

<style>
*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
background:#f6f2f8;
color:#222;
}

.hero{
background:linear-gradient(135deg,#2b004f,#8b1e5d);
color:white;
padding:60px 20px;
text-align:center;
}

.hero h1{
margin:0;
font-size:42px;
letter-spacing:2px;
}

.container{
max-width:1000px;
margin:-40px auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
margin-top:0;
color:#5a0d6f;
}

/* SESSION CARD */
.session{
border:2px solid #eee;
border-radius:14px;
padding:18px;
margin-bottom:12px;
cursor:pointer;
transition:0.3s;
}

.session:hover{
border-color:#8b1e5d;
transform:scale(1.01);
}

.session.active{
border-color:#8b1e5d;
background:#fff0f6;
}

.session strong{
color:#5a0d6f;
font-size:16px;
}

.session span{
display:block;
margin-top:6px;
color:#666;
}

/* FORM */
.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

label{
font-weight:bold;
font-size:14px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
}

input[readonly]{
background:#f3f3f3;
font-weight:bold;
}

button{
background:linear-gradient(135deg,#5a0d6f,#8b1e5d);
color:white;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.success,.error{
display:none;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.success{background:#e9fff0}
.error{background:#ffecec;color:red}

@media(max-width:800px){
.form-grid{grid-template-columns:1fr}
.hero h1{font-size:30px}
}
</style>

</head>

<body>

<div class="hero">
<h1>Clinic Research Excellence 2026</h1>
<p>Choose your session & secure your seat</p>
</div>

<div class="container">

<div class="card">
<h2>Select Your Session</h2>

<div class="session" data-value="Morning Session - Research Methodology" data-amount="199">
<strong>Morning Session – Research Methodology</strong>
<span>RM199</span>
</div>

<div class="session" data-value="Afternoon Session - Publisher Journal" data-amount="199">
<strong>Afternoon Session – Publisher Journal</strong>
<span>RM199</span>
</div>

<div class="session" data-value="Full Day - 2 Sessions" data-amount="349">
<strong>Full Day – 2 Sessions</strong>
<span>RM349</span>
</div>

</div>

<div class="card">
<h2>Registration</h2>

<form id="form">

<div class="form-grid">

<div>
<label>Full Name</label>
<input id="fullName" required>
</div>

<div>
<label>IC / Passport</label>
<input id="icNo" required>
</div>

<div>
<label>Phone</label>
<input id="phone" required>
</div>

<div>
<label>Email</label>
<input id="email" required>
</div>

<div>
<label>Current Status</label>
<select id="currentStatus" required>
<option value="">Select</option>
<option>PhD</option>
<option>Master</option>
<option>Interested</option>
</select>
</div>

<div>
<label>Institution</label>
<input id="institution">
</div>

<div>
<label>Payment Date</label>
<input type="date" id="paymentDate" required>
</div>

<div>
<label>Amount (RM)</label>
<input id="paymentAmount" readonly required>
</div>

<div>
<label>Upload Receipt</label>
<input type="file" id="receiptFile" required>
</div>

</div>

<br>
<button type="submit">Submit Registration</button>

</form>

<div class="success" id="success"></div>
<div class="error" id="error"></div>

</div>

</div>

<script>
const SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_URL';

let selectedSession = '';

document.querySelectorAll('.session').forEach(card=>{
card.addEventListener('click',function(){

document.querySelectorAll('.session').forEach(c=>c.classList.remove('active'));
this.classList.add('active');

selectedSession = this.getAttribute('data-value');
document.getElementById('paymentAmount').value = this.getAttribute('data-amount');

});
});

document.getElementById('form').addEventListener('submit', async e=>{
e.preventDefault();

if(!selectedSession){
alert('Please select a session');
return;
}

try{
const file = receiptFile.files[0];
const base64 = await toBase64(file);

const payload={
fullName: fullName.value,
icNo: icNo.value,
phone: phone.value,
email: email.value,
currentStatus: currentStatus.value,
sessionSelection: selectedSession,
institution: institution.value,
paymentDate: paymentDate.value,
paymentAmount: paymentAmount.value,
receiptBase64: base64,
receiptFileName: file.name,
receiptMimeType: file.type
};

const res = await fetch(SCRIPT_URL,{
method:'POST',
body: JSON.stringify(payload)
});

const data = await res.json();

success.style.display='block';
success.innerHTML='Success! ID: '+data.registrationId;

}catch(err){
error.style.display='block';
error.innerHTML=err;
}
});

function toBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(file);
});
}
</script>

</body>
</html>
