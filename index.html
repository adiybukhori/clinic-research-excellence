<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clinic Research Excellence 2026</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{margin:0;background:#faf7fc}
.hero{background:linear-gradient(135deg,#23003f,#7b1557);color:white;padding:50px;text-align:center}
.container{max-width:1000px;margin:-40px auto;padding:20px}
.card{background:white;padding:25px;border-radius:15px;margin-bottom:20px}
h2{color:#5a0d6f}
input,select{width:100%;padding:12px;margin-top:6px;border-radius:8px;border:1px solid #ccc}
button{background:#5a0d6f;color:white;padding:14px;border:none;border-radius:10px;font-weight:bold}
.success,.error{display:none;margin-top:15px;padding:15px;border-radius:10px}
.success{background:#e9fff0}
.error{background:#ffecec;color:red}
</style>

</head>

<body>

<div class="hero">
<h1>Clinic Research Excellence 2026</h1>
<p>Limited Seats Available</p>
</div>

<div class="container">

<div class="card">
<h2>Payment Instruction</h2>
<p><b>Public Bank</b><br>
Kolej Antarabangsa Inovatif Sdn Bhd<br>
Account No: <b>3150 9890 34</b></p>
</div>

<div class="card">
<h2>Registration</h2>

<form id="form">

<label>Full Name</label>
<input id="fullName" required>

<label>IC / Passport</label>
<input id="icNo" required>

<label>Phone</label>
<input id="phone" required>

<label>Email</label>
<input id="email" required>

<label>Current Status</label>
<select id="currentStatus" required>
<option value="">Select</option>
<option>PhD</option>
<option>Master</option>
<option>Interested</option>
</select>

<label>Session Selection</label>
<select id="sessionSelection" required>
<option value="">Select</option>
<option value="Morning - Research Methodology" data-amount="199">
Morning Session - Research Methodology (RM199)
</option>
<option value="Afternoon - Publisher Journal" data-amount="199">
Afternoon Session - Publisher Journal (RM199)
</option>
<option value="Full Day - 2 Sessions" data-amount="349">
Full Day - 2 Sessions (RM349)
</option>
</select>

<label>Institution</label>
<input id="institution">

<label>Payment Date</label>
<input type="date" id="paymentDate" required>

<label>Payment Amount</label>
<input id="paymentAmount" readonly required>

<label>Upload Receipt</label>
<input type="file" id="receiptFile" required>

<br><br>
<button type="submit">Submit</button>

</form>

<div class="success" id="success"></div>
<div class="error" id="error"></div>

</div>
</div>

<script>
const SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_URL';

document.getElementById('sessionSelection').addEventListener('change', function(){
const amount = this.options[this.selectedIndex].getAttribute('data-amount');
document.getElementById('paymentAmount').value = amount;
});

document.getElementById('form').addEventListener('submit', async e=>{
e.preventDefault();

try{
const file = document.getElementById('receiptFile').files[0];
const base64 = await toBase64(file);

const payload={
fullName: fullName.value,
icNo: icNo.value,
phone: phone.value,
email: email.value,
currentStatus: currentStatus.value,
sessionSelection: sessionSelection.value,
institution: institution.value,
paymentDate: paymentDate.value,
paymentAmount: paymentAmount.value,
receiptBase64: base64,
receiptFileName: file.name,
receiptMimeType: file.type
};

const res = await fetch(SCRIPT_URL,{
method:'POST',
body: JSON.stringify(payload)
});

const data = await res.json();

success.style.display='block';
success.innerHTML='Success! ID: '+data.registrationId;

}catch(err){
error.style.display='block';
error.innerHTML=err;
}
});

function toBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(file);
});
}
</script>

</body>
</html>
